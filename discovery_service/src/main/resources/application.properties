# Server Configuration
server.port=8761

# Spring Application
spring.application.name=discovery-service

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Eureka Instance Configuration
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# Eureka Client Configuration (Don't register with itself)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.registry-fetch-interval-seconds=5

# Eureka Server Configuration
eureka.server.eviction-interval-timer-in-ms=4000
eureka.server.enable-self-preservation=false
eureka.server.expected-client-renewal-interval-seconds=30

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,eureka
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.com.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
logging.level.com.leaderboard.discovery=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/discovery-service.log